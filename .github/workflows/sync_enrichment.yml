name: Sync enrichment data from server

# Pulls live enrichment_log.csv + ppi_map_data.csv from the Lightsail
# server every 6 hours and commits them back to the repo so deploys
# never lose user-generated data.
#
# Also runs on manual trigger: Actions → Sync enrichment data → Run workflow

on:
  schedule:
    - cron: '0 */6 * * *'   # 00:00, 06:00, 12:00, 18:00 UTC daily
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.LIGHTSAIL_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.LIGHTSAIL_HOST }} >> ~/.ssh/known_hosts

      - name: Pull enrichment files from server
        run: |
          scp -i ~/.ssh/id_ed25519 \
            ${{ secrets.LIGHTSAIL_USER }}@${{ secrets.LIGHTSAIL_HOST }}:/home/ubuntu/paisa-map/data/output/enrichment_log.csv \
            data/output/enrichment_log.csv

          scp -i ~/.ssh/id_ed25519 \
            ${{ secrets.LIGHTSAIL_USER }}@${{ secrets.LIGHTSAIL_HOST }}:/home/ubuntu/paisa-map/data/output/ppi_map_data.csv \
            data/output/ppi_map_data.csv

      - name: Commit and push if changed
        run: |
          git config user.name  "PaisaMap Bot"
          git config user.email "noreply@cooterlabs.com"
          git add data/output/enrichment_log.csv data/output/ppi_map_data.csv

          if git diff --staged --quiet; then
            echo "No new enrichment data — nothing to commit."
          else
            TOTAL=$(tail -n +2 data/output/enrichment_log.csv | wc -l | tr -d ' ')
            YAH=$(grep -c ',yah,' data/output/enrichment_log.csv || true)
            PRE=$(grep -c ',prefetch,' data/output/enrichment_log.csv || true)
            git commit -m "Auto-sync enrichment data: ${TOTAL} pincodes (yah=${YAH} prefetch=${PRE}) [skip ci]"
            git push
            echo "Synced. Total=${TOTAL}  YAH=${YAH}  Prefetch=${PRE}"
          fi
